<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizou - Missed Questions Review</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="container">
        <header role="banner">
            <div class="header-content">
                <div class="header-top">
                    <span class="header-welcome">
                        <span>Welcome</span>, <strong id="username-display"></strong>!
                    </span>
                    <button class="header-logout-btn" onclick="logout()" type="button">Logout</button>
                </div>
                <div class="header-bottom">
                    <div class="header-brand">
                        <img src="/static/logo.jpeg" alt="Quizou Logo" class="logo">
                        <div>
                            <h1>Quizou</h1>
                            <p class="subtitle">NAQT-Style Practice Questions Powered by AI</p>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <button class="menu-toggle" onclick="toggleMenu()" type="button" aria-label="Toggle navigation menu">Menu</button>
        <nav class="nav-bar" id="nav-menu" role="navigation" aria-label="Main navigation">
            <a href="/home" class="nav-link"><span>Home</span></a>
            <a href="/history" class="nav-link"><span>History</span></a>
            <a href="/topic-insights" class="nav-link"><span>Topic Insights</span></a>
            <a href="/competition" class="nav-link"><span>Competition</span></a>
            <a href="/daily-challenge" class="nav-link"><span>Daily</span></a>
            <a href="/recommendations" class="nav-link"><span>AI Coach</span></a>
            <a href="/flashcards" class="nav-link"><span>Flashcards</span></a>
                <a href="/packet-generator" class="nav-link"><span>Packets</span></a>
            <a href="/profile" class="nav-link"><span>Profile</span></a>
        </nav>

        <div id="main-content" role="main">
            <div class="missed-questions-page">
                <div class="page-header">
                    <div>
                        <h2>Missed Questions Review</h2>
                        <p>Review and retry questions you got wrong. Total missed: <strong id="missed-count">0</strong></p>
                    </div>
                </div>

                <div class="history-header">
                    <div class="history-filters">
                        <div class="filter-group">
                            <label for="topic-filter">Filter by Topic:</label>
                            <select id="topic-filter" onchange="applyFilters()">
                                <option value="all">All Topics</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="difficulty-filter">Filter by Difficulty:</label>
                            <select id="difficulty-filter" onchange="applyFilters()">
                                <option value="all">All Difficulties</option>
                                <option value="Easy">Easy</option>
                                <option value="Medium">Medium</option>
                                <option value="Hard">Hard</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="missed-questions-container" aria-live="polite">
                    <div class="loading">Loading missed questions...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/missed-questions.js"></script>
</body>
</html>
